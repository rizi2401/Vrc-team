services:
  - type: web
    name: vrchat-mod-team-portal
    runtime: node
    plan: starter
    region: frankfurt
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 24.13.0
      - key: DATA_DIR
        value: /var/data
      - key: COOKIE_SECURE
        value: "1"
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 5
